kind = "web"
previewPath = "/"
title = "CloudOps Monitor"
version = "1.0.0"
id = "artifacts/cloudops-monitor"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20732

[services.development]
run = "pnpm --filter @workspace/cloudops-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloudops-monitor", "run", "build" ]
serve = "static"
publicDir = "artifacts/cloudops-monitor/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20732"
BASE_PATH = "/"
